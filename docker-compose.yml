version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: attendai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - attendai-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: attendai

  mongo-express:
    image: mongo-express:latest
    container_name: attendai-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/attendai
    depends_on:
      - mongodb

volumes:
  attendai-mongo-data: